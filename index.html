<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#FAF6EA" />
<!-- iOS standalone (full-screen Add-to-Home-Screen, no SW needed on iOS) -->
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="NEXUS" />
<title>NEXUS · Seller OS</title>
<style>
  :root{
    --cream:#FAF6EA; --panel:#FFFFFF; --panel-2:#FFFDF6;
    --ink:#16160E; --ink-2:#6a6a59; --faint:#9a9a86;
    --lime:#8FCE00; --lime-soft:#CBF260; --yellow:#FFD12E;
    --grad:linear-gradient(135deg,#CBF260 0%,#FFD12E 100%);
    --line:#ECE6D4; --line-2:#E0D9C2;
    --warn:#C9820A; --warn-bg:#FFF1CE; --ok:#2E9E5B; --ok-bg:#E2F5E8; --info-bg:#EEF6CE;
    --sans:-apple-system,"Segoe UI",Roboto,system-ui,"Helvetica Neue",sans-serif;
    --mono:ui-monospace,"SF Mono",Menlo,Consolas,monospace;
    --bar:74px;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%}
  body{background:var(--cream);color:var(--ink);font-family:var(--sans);font-size:15px;line-height:1.45;
    -webkit-font-smoothing:antialiased;overflow:hidden;height:100dvh;display:flex;flex-direction:column}
  ::selection{background:var(--lime-soft)}
  button{font-family:inherit;cursor:pointer;border:none;background:none}
  button:focus-visible,input:focus-visible{outline:2px solid var(--lime);outline-offset:2px}
  svg{display:block}
  .body{flex:1 1 auto;overflow-y:auto;padding:0 18px calc(var(--bar) + 30px)}

  /* offline bar */
  .offbar{position:fixed;top:0;left:0;right:0;z-index:60;background:var(--warn-bg);color:#8a6d12;
    font-size:12px;font-weight:800;letter-spacing:.3px;text-align:center;padding:8px;border-bottom:1px solid #E8C97A;
    transform:translateY(-110%);transition:transform .25s ease;padding-top:max(8px,env(safe-area-inset-top));
    display:flex;align-items:center;justify-content:center;gap:8px}
  .offbar.on{transform:translateY(0)}
  .offbar .od{width:7px;height:7px;border-radius:50%;background:var(--warn)}

  .top{display:flex;align-items:center;justify-content:space-between;padding:16px 18px 10px;padding-top:max(16px,env(safe-area-inset-top))}
  .brand{display:flex;align-items:center;gap:9px;font-weight:900;font-size:20px;letter-spacing:-.5px}
  .brand .dot{width:9px;height:9px;border-radius:50%;background:var(--lime);box-shadow:0 0 0 4px rgba(143,206,0,.18);animation:pulse 1.8s ease-in-out infinite}
  @keyframes pulse{50%{box-shadow:0 0 0 8px rgba(143,206,0,0)}}
  .brand b{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;padding-right:2px}
  .seller{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--ink-2);font-weight:600}
  .ava{width:34px;height:34px;border-radius:12px;background:var(--grad);display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--ink);font-size:12px}

  .counters{display:flex;gap:12px;overflow-x:auto;padding:6px 0 4px;scrollbar-width:none}
  .counters::-webkit-scrollbar{display:none}
  .stat{flex:1 0 auto;min-width:128px;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:16px 16px 14px}
  .stat.hero{flex:1 0 64%;background:var(--grad);border:none;box-shadow:0 10px 26px rgba(200,180,0,.28)}
  .stat .lab{font-size:11px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;color:var(--ink-2)}
  .stat.hero .lab{color:#5c5410}
  .stat .val{font-size:30px;font-weight:900;letter-spacing:-1px;margin-top:6px;line-height:1}
  .stat .val small{font-size:15px;font-weight:700}
  .stat .sub{font-size:11px;color:var(--ink-2);margin-top:3px;font-weight:600}
  .stat.warn .val{color:var(--warn)}

  .btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;border-radius:20px;font-weight:800;font-size:16px;padding:17px;transition:transform .08s ease,box-shadow .15s ease}
  .btn:active{transform:scale(.975)}
  .btn-grad{background:var(--grad);color:var(--ink);box-shadow:0 10px 24px rgba(180,200,0,.36),inset 0 1px 0 rgba(255,255,255,.55)}
  .btn-grad:active{box-shadow:0 4px 12px rgba(180,200,0,.3)}
  .btn-dark{background:var(--ink);color:#fff}
  .btn-ghost{background:var(--panel);border:1.5px solid var(--line-2);color:var(--ink)}
  .btn svg{width:22px;height:22px}
  .btn-grad svg{stroke:var(--ink)} .btn-dark svg{stroke:#fff} .btn-ghost svg{stroke:var(--ink)}
  .btn[disabled]{opacity:.5;pointer-events:none}

  .sec-h{display:flex;align-items:center;justify-content:space-between;margin:24px 2px 12px}
  .sec-h h2{margin:0;font-size:17px;font-weight:800;letter-spacing:-.3px}
  .sec-h .more{font-size:12px;color:var(--ink-2);font-weight:600}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:22px;padding:18px}
  .card+.card{margin-top:12px}

  .field{margin-bottom:12px}
  .field label{display:block;font-size:11px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;color:var(--ink-2);margin-bottom:6px}
  .field input,.field select{width:100%;background:var(--panel-2);border:1.5px solid var(--line-2);border-radius:14px;color:var(--ink);font-family:var(--sans);font-size:15px;padding:13px 14px}
  .field input:focus{border-color:var(--lime)}
  .seg{display:flex;gap:8px;background:var(--panel-2);border:1.5px solid var(--line-2);border-radius:14px;padding:5px}
  .seg button{flex:1;border-radius:10px;padding:10px;font-weight:700;font-size:13px;color:var(--ink-2)}
  .seg button.on{background:var(--ink);color:#fff}

  .orow{display:flex;align-items:center;gap:13px;padding:14px 2px;border-top:1px solid var(--line)}
  .orow:first-of-type{border-top:none}
  .othumb{width:44px;height:44px;flex:0 0 auto;border-radius:13px;background:var(--info-bg);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:11px;color:var(--lime)}
  .orow .om{flex:1;min-width:0}
  .orow .ot{font-weight:700;font-size:14px}
  .orow .os{font-size:12px;color:var(--ink-2);margin-top:2px}
  .pill{flex:0 0 auto;font-size:10px;font-weight:800;letter-spacing:.3px;padding:5px 9px;border-radius:8px;text-transform:uppercase;white-space:nowrap}
  .pill.warn{background:var(--warn-bg);color:var(--warn)} .pill.ok{background:var(--ok-bg);color:var(--ok)}
  .pill.amber{background:#FFF1CE;color:#9a7400} .pill.draft{background:#F0EDE0;color:var(--ink-2)}
  .empty{text-align:center;color:var(--ink-2);font-size:13px;padding:26px 10px}
  .empty b{display:block;color:var(--warn);font-weight:800;letter-spacing:.3px;margin-bottom:6px;text-transform:uppercase;font-size:12px}

  .pgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .pcard{background:var(--panel);border:1px solid var(--line);border-radius:18px;overflow:hidden;text-align:left}
  .pcard .pim{aspect-ratio:1;background:var(--grad);display:flex;align-items:center;justify-content:center;font-weight:900;color:var(--ink);font-size:15px}
  .pcard .pim img{width:100%;height:100%;object-fit:cover}
  .pcard .pb{padding:11px 12px 13px}
  .pcard .pt{font-weight:700;font-size:13px;line-height:1.25}
  .pcard .pp{font-weight:900;font-size:15px;margin-top:5px}

  .nav{position:fixed;left:0;right:0;bottom:0;display:flex;justify-content:center;pointer-events:none;padding-bottom:max(12px,env(safe-area-inset-bottom));z-index:30}
  .nav-in{pointer-events:auto;display:flex;align-items:center;gap:6px;background:var(--panel);border:1px solid var(--line);border-radius:30px;padding:8px;box-shadow:0 12px 34px rgba(60,55,20,.16)}
  .nb{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center}
  .nb svg{width:23px;height:23px;stroke:var(--faint);stroke-width:2;fill:none}
  .nb.on svg{stroke:var(--ink)}
  .nb-cap{width:58px;height:58px;border-radius:50%;background:var(--grad);box-shadow:0 8px 20px rgba(180,200,0,.45)}
  .nb-cap svg{width:27px;height:27px;stroke:var(--ink);stroke-width:2.2}

  .scrim{position:fixed;inset:0;background:rgba(30,28,12,.5);opacity:0;pointer-events:none;transition:.2s;z-index:50}
  .scrim.on{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;background:var(--cream);border-radius:26px 26px 0 0;transform:translateY(102%);transition:transform .26s cubic-bezier(.2,.9,.25,1);z-index:51;max-height:92dvh;overflow-y:auto;padding:8px 18px calc(22px + env(safe-area-inset-bottom))}
  .sheet.on{transform:translateY(0)}
  .grab{width:42px;height:5px;background:var(--line-2);border-radius:3px;margin:8px auto 14px}
  .sheet h3{margin:2px 0 4px;font-size:20px;font-weight:900;letter-spacing:-.4px}
  .sheet .hint{color:var(--ink-2);font-size:13px;margin:0 0 16px}

  .cam-stage{position:relative;width:100%;aspect-ratio:3/4;background:#111;border-radius:20px;overflow:hidden;display:flex;align-items:center;justify-content:center}
  .cam-stage video,.cam-stage img,.cam-stage canvas{width:100%;height:100%;object-fit:cover}
  .cam-fallback{color:#fff;text-align:center;padding:24px;font-size:13px}
  .shutter{width:76px;height:76px;border-radius:50%;background:var(--grad);margin:18px auto 0;box-shadow:0 0 0 5px rgba(203,242,96,.3),0 10px 24px rgba(180,200,0,.4);display:flex;align-items:center;justify-content:center}
  .shutter:active{transform:scale(.94)}
  .shutter .ring{width:58px;height:58px;border-radius:50%;border:3px solid var(--ink)}
  .cam-row{display:flex;gap:10px;margin-top:16px}
  .cam-row .btn{flex:1}
  .uploaded{display:flex;align-items:center;gap:12px;background:var(--ok-bg);border:1px solid #BFE8CC;border-radius:14px;padding:12px;margin-top:14px}
  .uploaded img{width:46px;height:46px;border-radius:10px;object-fit:cover}
  .uploaded .u-t{font-size:12px;font-weight:700;color:var(--ok)}
  .uploaded .u-l{font-size:11px;color:var(--ink-2);word-break:break-all}
  .roadmap{display:flex;align-items:center;gap:8px;background:#FFF1CE;border:1px dashed #E8C97A;border-radius:12px;padding:11px 13px;margin-top:12px;font-size:12px;color:#8a6d12;font-weight:600}

  .toast{position:fixed;left:50%;bottom:calc(var(--bar) + 24px);transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;font-size:13px;font-weight:600;padding:12px 18px;border-radius:14px;opacity:0;transition:.25s;z-index:80;pointer-events:none}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .spin{width:18px;height:18px;border:2.5px solid rgba(0,0,0,.25);border-top-color:var(--ink);border-radius:50%;animation:sp .7s linear infinite;display:inline-block}
  @keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div class="offbar" id="offBar"><span class="od"></span> OFFLINE MODE · showing cached data</div>

<div class="top">
  <div class="brand"><span class="dot"></span><b>NEXUS</b></div>
  <div class="seller">HANDS&amp;HEAD<div class="ava">H&amp;H</div></div>
</div>

<div class="body" id="body"></div>
<div class="nav"><div class="nav-in" id="nav"></div></div>
<div class="scrim" id="scrim" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>
<div class="toast" id="toast"></div>

<script>
/* ===========================================================
   PWA BOOT — inline manifest + icon + Apple meta + SW register
   The SW (sw.js) is the one required separate file; without it
   the app still runs, it just won't launch fully offline.
   =========================================================== */
(function(){
  var svg="<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'>"+
    "<defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'>"+
    "<stop offset='0' stop-color='#CBF260'/><stop offset='1' stop-color='#FFD12E'/></linearGradient></defs>"+
    "<rect width='512' height='512' rx='112' fill='url(#g)'/>"+
    "<path d='M168 360 V160 L344 360 V160' fill='none' stroke='#16160E' stroke-width='54' stroke-linecap='square' stroke-linejoin='miter'/></svg>";
  var icon="data:image/svg+xml;charset=utf-8,"+encodeURIComponent(svg);

  var manifest={
    name:"NEXUS · Seller OS", short_name:"NEXUS",
    description:"Zero-subscription headless commerce OS for BD sellers.",
    start_url:".", scope:".", display:"standalone", orientation:"portrait",
    background_color:"#FAF6EA", theme_color:"#FAF6EA",
    icons:[{src:icon,sizes:"any",type:"image/svg+xml",purpose:"any"},
           {src:icon,sizes:"512x512",type:"image/svg+xml",purpose:"maskable"}]
  };
  try{
    var ml=document.createElement("link"); ml.rel="manifest";
    ml.href=URL.createObjectURL(new Blob([JSON.stringify(manifest)],{type:"application/manifest+json"}));
    document.head.appendChild(ml);
  }catch(e){}
  var al=document.createElement("link"); al.rel="apple-touch-icon"; al.href=icon; document.head.appendChild(al);

  if("serviceWorker" in navigator){ navigator.serviceWorker.register("./sw.js").catch(function(){}); }
})();

/* ===========================================================
   CONFIG
   =========================================================== */
const SPINE_URL = "https://script.google.com/macros/s/AKfycbxvA6gClfW88hKLw6PioOl_1RXsa856Cirjg36dyqZXvCBEyNlSpkwGyJoS8A80oIoaEg/exec";                  // ← your Apps Script /exec URL
const WHATSAPP  = "8801974518600";     // digits only
const SHOP      = "HANDS&HEAD";

/* ===========================================================
   LOCAL CACHE  (zero-latency UI)
   Guarded so it no-ops where storage is blocked (e.g. the in-chat
   preview); fully active on GitHub Pages / installed PWA.
   =========================================================== */
const LS={
  get(k){ try{ var v=localStorage.getItem("nexus_"+k); return v?JSON.parse(v):null; }catch(e){ return null; } },
  set(k,v){ try{ localStorage.setItem("nexus_"+k,JSON.stringify(v)); }catch(e){} }
};

/* ===========================================================
   OFFLINE STATE
   =========================================================== */
let offline=!navigator.onLine;
function setOffline(b){ offline=b; var el=document.getElementById("offBar"); if(el) el.classList.toggle("on",b); }
window.addEventListener("online",function(){ setOffline(false); render(); });
window.addEventListener("offline",function(){ setOffline(true); });

/* ===========================================================
   BACKEND GATEWAY (demo fallback for preview)
   =========================================================== */
async function spine(action, payload={}){
  if(SPINE_URL){
    const r=await fetch(SPINE_URL,{method:"POST",headers:{"Content-Type":"text/plain;charset=utf-8"},body:JSON.stringify({action,payload})});
    if(!r.ok) throw new Error("SPINE "+r.status);
    return await r.json();
  }
  return demo(action,payload);
}
let dOrders=[
  {id:"NX-1008",t:"RAWx Tiger Tee",s:"bKash · 01712-xxxxx",trx:"BKH8842Q2",st:["PENDING VERIFICATION","warn"]},
  {id:"NX-1007",t:"BD Football '26 ×2",s:"WhatsApp · Chattogram",trx:"",st:["NEW","amber"]},
  {id:"NX-1006",t:"Drop-Shoulder Mono",s:"bKash · Sylhet",trx:"BKH7710LP",st:["PAID","ok"]}
];
const dCat=[
  {id:"t1",t:"RAWx Tiger Tee",cat:"RAWx",price:650,ini:"RWX",img:""},
  {id:"t2",t:"BD Football '26",cat:"FOOTBALL",price:650,ini:"BD26",img:""},
  {id:"t3",t:"Drop-Shoulder Mono",cat:"ALL",price:750,ini:"DSM",img:""},
  {id:"t4",t:"Women's Oversized",cat:"WOMEN",price:650,ini:"WMN",img:""}
];
function demo(a,p){
  if(a==="getStats")   return Promise.resolve({salesToday:12500,ordersToday:8,pending:3,catalog:dCat.length});
  if(a==="listOrders") return Promise.resolve({items:dOrders});
  if(a==="getFeed")    return Promise.resolve({items:dCat});
  if(a==="placeOrder"){ const st=(p.method==="bkash"||p.method==="nagad")?["PENDING VERIFICATION","warn"]:["NEW","amber"];
    dOrders.unshift({id:"NX-"+(1009+dOrders.length),t:p.item,s:methodLabel(p.method)+(p.phone?" · "+p.phone:""),trx:p.trxid||"",st}); return Promise.resolve({ok:true,id:"NX",status:st[0]}); }
  if(a==="uploadImage")return Promise.resolve({ok:true,id:"demo",url:p.dataUrl,name:p.name});
  return Promise.resolve({error:"unknown "+a});
}
function methodLabel(m){m=(m||"").toLowerCase();return m==="bkash"?"bKash":m==="nagad"?"Nagad":m==="whatsapp"?"WhatsApp":m;}

/* ===========================================================
   ICONS
   =========================================================== */
const I={
  home:'<svg viewBox="0 0 24 24"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>',
  cam:'<svg viewBox="0 0 24 24"><path d="M4 8h3l2-2h6l2 2h3v11H4z"/><circle cx="12" cy="13" r="3.5"/></svg>',
  orders:'<svg viewBox="0 0 24 24"><rect x="4" y="3" width="16" height="18" rx="2"/><path d="M8 8h8M8 12h8M8 16h5"/></svg>',
  store:'<svg viewBox="0 0 24 24"><path d="M4 9l1-5h14l1 5"/><path d="M4 9v11h16V9"/><path d="M4 9h16"/></svg>',
  more:'<svg viewBox="0 0 24 24"><path d="M4 7h16M4 12h16M4 17h16"/></svg>',
  bolt:'<svg viewBox="0 0 24 24"><path d="M13 2L4 14h6l-1 8 9-12h-6z"/></svg>',
  wa:'<svg viewBox="0 0 24 24"><path d="M12 3a9 9 0 00-7.7 13.6L3 21l4.5-1.2A9 9 0 1012 3z"/><path d="M8.5 8.5c0 4 3 7 7 7"/></svg>',
  check:'<svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg>',
  fb:'<svg viewBox="0 0 24 24"><path d="M14 8h3V4h-3a4 4 0 00-4 4v2H8v4h2v8h4v-8h3l1-4h-4V8a1 1 0 011-1z"/></svg>'
};

/* ===========================================================
   STATE + ROUTER
   =========================================================== */
let screen="home", camStream=null, lastShot=null;
function go(s){ screen=s; render(); document.getElementById("body").scrollTop=0; }
function render(){
  renderNav();
  const b=document.getElementById("body");
  if(screen==="home")   return renderHome(b);
  if(screen==="orders") return renderOrders(b);
  if(screen==="store")  return renderStore(b);
  if(screen==="more")   return renderMore(b);
}
function renderNav(){
  const items=[["home",I.home],["orders",I.orders],["__cap",I.cam],["store",I.store],["more",I.more]];
  document.getElementById("nav").innerHTML=items.map(([id,ic])=>{
    if(id==="__cap") return `<button class="nb nb-cap" data-go="__cap">${ic}</button>`;
    return `<button class="nb ${id===screen?"on":""}" data-go="${id}">${ic}</button>`;
  }).join("");
  document.querySelectorAll("[data-go]").forEach(b=>b.onclick=()=>{ b.dataset.go==="__cap"?openCamera():go(b.dataset.go); });
}

/* ---- HOME (cache-first → background sync) ---- */
function renderHome(b){
  const s=LS.get("stats")||{salesToday:0,ordersToday:0,pending:0,catalog:0};
  const o=LS.get("orders")||[];
  b.innerHTML=`
    <div id="counters">${countersHtml(s)}</div>
    <button class="btn btn-grad" style="margin-top:18px" onclick="openCamera()">${I.cam} One-Tap Capture</button>
    <div class="sec-h"><h2>Quick order</h2></div>
    <div class="card">
      <div class="field"><label>Product</label><input id="q_item" placeholder="e.g. RAWx Tiger Tee"></div>
      <div style="display:flex;gap:12px">
        <div class="field" style="flex:1"><label>Price ৳</label><input id="q_price" inputmode="numeric" placeholder="650"></div>
        <div class="field" style="flex:1.3"><label>Phone</label><input id="q_phone" inputmode="tel" placeholder="01XXXXXXXXX"></div>
      </div>
      <div class="field"><label>Payment</label>
        <div class="seg" id="q_seg">
          <button class="on" data-m="whatsapp">WhatsApp</button>
          <button data-m="bkash">bKash</button>
          <button data-m="nagad">Nagad</button>
        </div></div>
      <div class="field" id="q_trxwrap" style="display:none"><label>bKash/Nagad TrxID</label><input id="q_trx" placeholder="e.g. BKH8842Q2"></div>
      <button class="btn btn-dark" id="q_go">${I.check} Log order</button>
    </div>
    <div class="sec-h"><h2>Recent orders</h2><span class="more" onclick="go('orders')">All →</span></div>
    <div class="card" id="recent">${ordersHtml(o.slice(0,4))}</div>`;
  wireQuickOrder(b);
  syncHome();
}
function countersHtml(s){
  return `<div class="counters">
    <div class="stat hero"><div class="lab">Sales today</div><div class="val"><small>৳</small>${Number(s.salesToday||0).toLocaleString()}</div><div class="sub" style="color:#5c5410">${s.ordersToday||0} orders</div></div>
    <div class="stat warn"><div class="lab">Pending</div><div class="val">${s.pending||0}</div><div class="sub">bKash/Nagad</div></div>
    <div class="stat"><div class="lab">Catalog</div><div class="val">${s.catalog||0}</div><div class="sub">products</div></div>
  </div>`;
}
async function syncHome(){
  try{
    const [s,oRes]=await Promise.all([spine("getStats"),spine("listOrders")]);
    const o=oRes.items||[];
    LS.set("stats",s); LS.set("orders",o); setOffline(false);
    const c=document.getElementById("counters"); if(c) c.innerHTML=countersHtml(s);
    const r=document.getElementById("recent"); if(r) r.innerHTML=ordersHtml(o.slice(0,4));
  }catch(e){ setOffline(true); }
}
function wireQuickOrder(b){
  let method="whatsapp";
  document.querySelectorAll("#q_seg button").forEach(x=>x.onclick=()=>{
    document.querySelectorAll("#q_seg button").forEach(y=>y.classList.remove("on")); x.classList.add("on");
    method=x.dataset.m; document.getElementById("q_trxwrap").style.display=(method==="whatsapp")?"none":"block";
  });
  document.getElementById("q_go").onclick=async()=>{
    const item=val("q_item"); if(!item){ toast("Add a product name"); return; }
    const payload={item,price:val("q_price"),phone:val("q_phone"),method,trxid:val("q_trx")};
    const btn=document.getElementById("q_go"); btn.innerHTML='<span class="spin"></span> Logging…';
    try{ const r=await spine("placeOrder",payload); toast(r.status==="PENDING VERIFICATION"?"Logged — pending bKash verify":"Order logged ✓"); renderHome(b); }
    catch(e){ toast("Offline — order not sent"); setOffline(true); btn.innerHTML=I.check+" Log order"; }
  };
}
function ordersHtml(o){
  if(!o||!o.length) return `<div class="empty"><b>No orders</b>Log one above to see it here.</div>`;
  return o.map(d=>`<div class="orow"><div class="othumb">${esc((d.id||"NX").split("-")[1]||"NX")}</div>
    <div class="om"><div class="ot">${esc(d.t)}</div><div class="os">${esc(d.s)}${d.trx?" · "+esc(d.trx):""}</div></div>
    <span class="pill ${d.st[1]}">${esc(d.st[0])}</span></div>`).join("");
}

/* ---- ORDERS (cache-first) ---- */
async function renderOrders(b){
  const o=LS.get("orders")||[];
  b.innerHTML=`<div class="sec-h"><h2>Orders</h2><span class="more" id="oCount">${o.length} total</span></div><div class="card" id="oList">${ordersHtml(o)}</div>`;
  try{ const fresh=(await spine("listOrders")).items||[]; LS.set("orders",fresh); setOffline(false);
    const l=document.getElementById("oList"); if(l) l.innerHTML=ordersHtml(fresh);
    const c=document.getElementById("oCount"); if(c) c.textContent=fresh.length+" total";
  }catch(e){ setOffline(true); }
}

/* ---- STORE (cache-first) ---- */
async function renderStore(b){
  const c=LS.get("cat")||[];
  b.innerHTML=`<div class="sec-h"><h2>Storefront</h2><span class="more">${SHOP}</span></div><div id="storeGrid">${storeGridHtml(c)}</div>`;
  bindBuy(c);
  try{ const fresh=(await spine("getFeed")).items||[]; LS.set("cat",fresh); setOffline(false);
    const g=document.getElementById("storeGrid"); if(g){ g.innerHTML=storeGridHtml(fresh); bindBuy(fresh); }
  }catch(e){ setOffline(true); }
}
function storeGridHtml(c){
  return c&&c.length?`<div class="pgrid">${c.map(p=>`<button class="pcard" data-buy="${esc(p.id)}">
    <div class="pim">${p.img?`<img src="${esc(p.img)}">`:esc(p.ini)}</div>
    <div class="pb"><div class="pt">${esc(p.t)}</div><div class="pp">৳${esc(p.price)}</div></div></button>`).join("")}</div>`
    :`<div class="card"><div class="empty"><b>Catalog empty</b>Capture a product or fill the Catalog sheet.</div></div>`;
}
function bindBuy(c){ document.querySelectorAll("[data-buy]").forEach(x=>x.onclick=()=>checkout((c||[]).find(p=>p.id===x.dataset.buy))); }
function checkout(p){
  if(!p) return;
  openSheet(`<h3>${esc(p.t)}</h3><p class="hint">৳${esc(p.price)} · ${esc(p.cat)}</p>
    <button class="btn btn-grad" id="co_wa">${I.wa} Checkout via WhatsApp</button>
    <div style="text-align:center;color:var(--ink-2);font-size:12px;font-weight:600;margin:14px 0">— or pay & verify —</div>
    <div class="field"><label>bKash / Nagad TrxID</label><input id="co_trx" placeholder="Enter after sending money"></div>
    <button class="btn btn-dark" id="co_pay">${I.check} Confirm bKash order</button>`);
  document.getElementById("co_wa").onclick=async()=>{
    try{ await spine("placeOrder",{item:p.t,sku:p.id,price:p.price,method:"whatsapp"}); }catch(e){}
    const msg=encodeURIComponent(`${SHOP} order:\n${p.t}\n৳${p.price}`);
    window.open(`https://wa.me/${WHATSAPP}?text=${msg}`,"_blank"); closeSheet(); toast("Sent to WhatsApp");
  };
  document.getElementById("co_pay").onclick=async()=>{
    const trx=val("co_trx"); if(!trx){ toast("Enter the TrxID"); return; }
    try{ await spine("placeOrder",{item:p.t,sku:p.id,price:p.price,method:"bkash",trxid:trx}); closeSheet(); toast("Order placed — pending verification"); }
    catch(e){ toast("Offline — try again when connected"); setOffline(true); }
  };
}

/* ---- MORE (roadmap, honestly gated) ---- */
function renderMore(b){
  const gated=[
    ["Unified Inbox","Meta + WhatsApp messages in one view","needs Meta App review"],
    ["FB auto-post","Publish captures as shoppable posts","needs Pages permission"],
    ["Daraz Sync","Orders + AI category mapping","needs Daraz Open API app"],
    ["3-Click Ads","Marketing API campaign launcher","needs ads_management + verification"]
  ];
  b.innerHTML=`<div class="sec-h"><h2>Roadmap</h2></div>
    <div class="roadmap" style="margin:0 0 14px">${I.bolt}&nbsp; These need platform approval — not code. Unlock by starting Meta Business verification.</div>
    ${gated.map(g=>`<div class="card" style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
      <div style="flex:1"><div style="font-weight:800">${g[0]}</div><div style="font-size:12px;color:var(--ink-2);margin-top:2px">${g[1]}</div></div>
      <span class="pill draft">${g[2]}</span></div>`).join("")}`;
}

/* ===========================================================
   ONE-TAP CAMERA  (unchanged logic)
   =========================================================== */
async function openCamera(){
  openSheet(`<h3>One-Tap Capture</h3><p class="hint">Snap a product → saves hi-res to your Drive.</p>
    <div class="cam-stage" id="camStage">
      <div class="cam-fallback" id="camFb">Starting camera…</div>
      <video id="camVid" autoplay playsinline muted style="display:none"></video>
      <canvas id="camCanvas" style="display:none"></canvas>
      <img id="camPrev" style="display:none">
    </div>
    <div id="camControls"></div>
    <input type="file" id="camFile" accept="image/*" capture="environment" style="display:none">`);
  document.getElementById("camControls").innerHTML=`<button class="shutter" id="shutter" style="display:none"><span class="ring"></span></button>`;
  const file=document.getElementById("camFile");
  file.onchange=()=>{ if(file.files[0]) fileToShot(file.files[0]); };
  try{
    if(!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) throw 0;
    camStream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"},audio:false});
    const v=document.getElementById("camVid"); v.srcObject=camStream;
    document.getElementById("camFb").style.display="none"; v.style.display="block";
    const sh=document.getElementById("shutter"); sh.style.display="flex"; sh.onclick=captureFrame;
  }catch(e){
    document.getElementById("camFb").innerHTML="Live camera unavailable here.<br>Tap below to open your camera / gallery.";
    document.getElementById("camControls").innerHTML=`<button class="btn btn-grad" style="margin-top:14px" onclick="document.getElementById('camFile').click()">${I.cam} Open camera</button>`;
  }
}
function captureFrame(){ const v=document.getElementById("camVid"); const url=frameToDataUrl(v,v.videoWidth,v.videoHeight); stopCam(); showShot(url); }
function fileToShot(f){ const r=new FileReader(); r.onload=()=>{ const img=new Image(); img.onload=()=>showShot(frameToDataUrl(img,img.naturalWidth,img.naturalHeight)); img.src=r.result; }; r.readAsDataURL(f); }
function frameToDataUrl(src,w,h){ const max=1280,scale=Math.min(1,max/Math.max(w,h)); const c=document.getElementById("camCanvas"); c.width=Math.round(w*scale); c.height=Math.round(h*scale); c.getContext("2d").drawImage(src,0,0,c.width,c.height); return c.toDataURL("image/jpeg",0.85); }
function showShot(dataUrl){
  lastShot=dataUrl;
  document.getElementById("camFb").style.display="none";
  document.getElementById("camVid").style.display="none";
  const p=document.getElementById("camPrev"); p.src=dataUrl; p.style.display="block";
  document.getElementById("camControls").innerHTML=`
    <div class="cam-row"><button class="btn btn-ghost" onclick="openCamera()">Retake</button>
    <button class="btn btn-grad" id="saveShot">${I.check} Save to Drive</button></div><div id="shotResult"></div>`;
  document.getElementById("saveShot").onclick=saveShot;
}
async function saveShot(){
  const btn=document.getElementById("saveShot"); btn.innerHTML='<span class="spin"></span> Uploading…'; btn.disabled=true;
  try{
    const r=await spine("uploadImage",{dataUrl:lastShot,name:"nexus_"+Date.now()+".jpg"});
    document.getElementById("shotResult").innerHTML=`
      <div class="uploaded"><img src="${esc(r.url)}"><div><div class="u-t">Saved to Drive ✓</div><div class="u-l">${esc(r.url)}</div></div></div>
      <div class="roadmap">${I.fb}&nbsp; Auto-post to Facebook Page — unlocks after Meta Business verification.</div>
      <button class="btn btn-dark" disabled style="margin-top:12px">${I.fb} Publish to FB (roadmap)</button>`;
    toast("Image saved to Drive");
  }catch(e){ document.getElementById("shotResult").innerHTML=`<div class="roadmap">Upload failed: ${esc(e.message)} — check SPINE_URL / connection.</div>`; setOffline(true); btn.innerHTML=I.check+" Save to Drive"; btn.disabled=false; }
}
function stopCam(){ if(camStream){ camStream.getTracks().forEach(t=>t.stop()); camStream=null; } }

/* ===========================================================
   SHEET + UTIL
   =========================================================== */
function openSheet(html){ document.getElementById("sheet").innerHTML=`<div class="grab"></div>`+html; document.getElementById("sheet").classList.add("on"); document.getElementById("scrim").classList.add("on"); }
function closeSheet(){ stopCam(); document.getElementById("sheet").classList.remove("on"); document.getElementById("scrim").classList.remove("on"); }
let toastT=null;
function toast(m){ const t=document.getElementById("toast"); t.textContent=m; t.classList.add("on"); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove("on"),2400); }
function val(id){ const e=document.getElementById(id); return e?e.value.trim():""; }
function esc(s){ return String(s==null?"":s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

setOffline(!navigator.onLine);
render();
</script>
