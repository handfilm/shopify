<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#FAF6EA" id="themeColor" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" id="appleStatusBar" />
<meta name="apple-mobile-web-app-title" content="NexOS" />
<title>NexOS · Seller OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap" rel="stylesheet">
<!-- Link to extracted CSS -->
<link rel="stylesheet" href="css/theme.css">
<!-- Optional Shake Animation for PIN Gate -->
<style>
  @keyframes shake {
    0%,100% { transform: translate(-50%,-50%) scale(1) translateX(0); }
    20%     { transform: translate(calc(-50% - 8px),-50%) scale(1); }
    40%     { transform: translate(calc(-50% + 8px),-50%) scale(1); }
    60%     { transform: translate(calc(-50% - 5px),-50%) scale(1); }
    80%     { transform: translate(calc(-50% + 5px),-50%) scale(1); }
  }
</style>
</head>
<body>

<div class="body-glow"></div>
<div class="offbar" id="offBar"><span class="od"></span> OFFLINE CACHE MODE</div>

<div class="topbar">
  <div class="tbar-left">
    <button class="tbar-icon" onclick="openSearch()">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
    </button>
  </div>
  <div class="brand" onclick="openDrawer()">
    <div class="brand-icon"></div>
    <div class="brand-label">
      <span class="brand-main">NexOS</span>
      <span class="brand-os">OS</span>
    </div>
  </div>
  <div class="tbar-right">
    <div id="modeTag" class="mode-tag">Lite Seller</div>
    <button class="tbar-icon" onclick="renderAIChat()">
      <svg viewBox="0 0 24 24"><path d="M12 2l2 7 7 2-7 2-2 7-2-7-7-2 7-2z"/></svg>
    </button>
  </div>
</div>

<div class="body" id="body"></div>
<div class="tabbar"><div class="pill-bar" id="tabbar"></div></div>

<div class="scrim" id="scrim" onclick="closeSheet()"></div>
<div class="sheet" id="sheet"></div>
<div class="scrim" id="drawerScrim" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"></div>
<!-- Expert Mode PIN Gate -->
<div class="scrim" id="gateScrim" style="z-index:69;" onclick="closeGate()"></div>
<div class="gate" id="gate">
  <div class="gate-icon">
    <svg viewBox="0 0 24 24"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/><circle cx="12" cy="16" r="1.5" fill="currentColor" stroke="none"/></svg>
  </div>
  <h3>Expert Mode</h3>
  <div class="gate-sub">ENTER 4-DIGIT PIN TO UNLOCK</div>
  <input id="gatePin" type="password" inputmode="numeric" placeholder="····" maxlength="4" />
  <div style="display:flex; gap:10px;">
    <button class="btn btn-dark" onclick="closeGate()">Cancel</button>
    <button class="btn btn-grad" onclick="tryGate()">Unlock</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Link to extracted JS -->
<script src="js/app.js"></script>
<script src="js/modules.js"></script>

</body>
</html>
